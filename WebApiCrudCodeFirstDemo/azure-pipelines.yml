# ============================================================
# PIPELINE FLOW - EASY WAY TO REMEMBER
# ============================================================
#
# 1. TRIGGER
#    "When should I start?"
#
# 2. AGENT
#    "Which temporary computer should run this?"
#
# 3. RESTORE
#    "Download the required packages."
#
# 4. BUILD
#    "Compile my C# code."
#
# 5. TEST
#    "Do the automated tests pass?"
#
# 6. PUBLISH
#    "Create the final runnable application."
#
# 7. ARTIFACT
#    "Save the application package."
#
# 8. DEPLOY
#    "Send the package to Azure App Service."
#
# ============================================================

# ------------------------------------------------------------
# 1. TRIGGER
# ------------------------------------------------------------

# Run this pipeline automatically whenever code is pushed
# to the "main" branch in GitHub.
#
# Example:
# You change code in Visual Studio
#
# git push
#
# GitHub main branch changes
#
# Azure DevOps pipeline starts automatically
# ------------------------------------------------------------

trigger:
- main

# ------------------------------------------------------------
# 2. AGENT / BUILD MACHINE
# ------------------------------------------------------------

# Azure DevOps provides a temporary Windows computer
# to execute the pipeline.
#
# This computer will:
# - Download your code from GitHub
# - Restore NuGet packages
# - Build your application
# - Run tests
# - Publish your application
# - Deploy to Azure
#
# After the pipeline finishes, the temporary machine is removed.
# ------------------------------------------------------------

pool:
  vmImage: 'windows-latest'

# ------------------------------------------------------------
# 3. VARIABLES
# ------------------------------------------------------------

# These are reusable values used later in the pipeline.
#
# solution:
# Find any .sln file in the GitHub repository.
#
# buildConfiguration:
# Build the application in Release mode.
# ------------------------------------------------------------

variables:
  solution: '**/*.sln'
  buildConfiguration: 'Release'

# ============================================================
# PIPELINE STEPS
# ============================================================

steps:

# ------------------------------------------------------------
# 4. INSTALL BUILD TOOLS
# ------------------------------------------------------------

# The Azure DevOps build machine is temporary.
# We install the NuGet tool required to restore packages
# used by this classic ASP.NET Web API project.
#
# Your project uses:
# - ASP.NET Web API 2
# - .NET Framework 4.7.2
# - packages.config
# - Entity Framework 6
#
# The Windows hosted agent provides the required
# Visual Studio/MSBuild tools for building the project.
# ------------------------------------------------------------

- task: NuGetToolInstaller@1
  displayName: 'Install NuGet'

# ------------------------------------------------------------
# 5. RESTORE NUGET PACKAGES
# ------------------------------------------------------------

# This downloads the NuGet packages required by the project.
#
# The project uses the older packages.config format.
# NuGet restore downloads the packages into the packages
# folder expected by the project.
#
# Examples of packages restored:
# - Entity Framework 6
# - ASP.NET Web API
# - OWIN
# - Newtonsoft.Json
# - Other NuGet dependencies
# ------------------------------------------------------------

- task: NuGetCommand@2
  displayName: 'Restore NuGet packages'
  inputs:
    restoreSolution: '$(solution)'
    feedsToUse: 'select'

# ------------------------------------------------------------
# 6. BUILD THE APPLICATION
# ------------------------------------------------------------

# This compiles the ASP.NET Web API 2 application.
#
# The project targets:
#
# .NET Framework 4.7.2
#
# The Visual Studio Build task uses MSBuild to compile
# the classic ASP.NET Web API project.
#
# If there is a C# compilation error,
# this pipeline step fails.
# ------------------------------------------------------------

- task: VSBuild@1
  displayName: 'Build application'
  inputs:
    solution: '$(solution)'
    platform: 'Any CPU'
    configuration: '$(buildConfiguration)'

# ------------------------------------------------------------
# 7. RUN AUTOMATED TESTS
# ------------------------------------------------------------

# This runs automated tests in test assemblies.
#
# If test projects exist in the solution, their compiled
# test assemblies can be discovered and executed here.
#
# If a test fails, the pipeline stops.
# ------------------------------------------------------------

- task: VSTest@2
  displayName: 'Run automated tests'
  inputs:
    platform: 'Any CPU'
    configuration: '$(buildConfiguration)'
    testSelector: 'testAssemblies'
    testAssemblyVer2: |
      **\*test*.dll
      !**\obj\**
      !**\*TestAdapter.dll
      !**\TestPlatform.TestHost.dll

# ------------------------------------------------------------
# 8. PUBLISH THE APPLICATION
# ------------------------------------------------------------

# "Build" and "Publish" are different.
#
# BUILD:
# Checks and compiles your source code.
#
# PUBLISH:
# Creates a deployable ZIP package containing the files
# required to run the ASP.NET Web API application on Azure App Service.
#
# The ZIP package will be placed in:
#
# $(Build.ArtifactStagingDirectory)
#
# This is a temporary folder provided by Azure DevOps.
# ------------------------------------------------------------

- task: MSBuild@1
  displayName: 'Publish application'
  inputs:
    solution: '$(solution)'
    platform: 'Any CPU'
    configuration: '$(buildConfiguration)'
    msbuildArguments: >
      /p:DeployOnBuild=true
      /p:WebPublishMethod=Package
      /p:PackageAsSingleFile=true
      /p:SkipInvalidConfigurations=true
      /p:PackageLocation="$(Build.ArtifactStagingDirectory)\WebApiCrudCodeFirstDemo.zip"

# ------------------------------------------------------------
# 9. PUBLISH THE ARTIFACT
# ------------------------------------------------------------

# The published application is now stored by Azure DevOps.
#
# The artifact is called:
#
# drop
#
# Think of an Artifact as:
#
# "The finished application package that is ready for deployment."
#
# The build machine is temporary.
# The Artifact is saved so it can be used for deployment.
# ------------------------------------------------------------

- task: PublishBuildArtifacts@1
  displayName: 'Store application Artifact'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'drop'
    publishLocation: 'Container'



# If the Publish step succeeds but the ZIP is still not there, add this temporary diagnostic step after the Publish task:
# ------------------------------------------------------------
- task: PowerShell@2
  displayName: 'Check generated deployment package'
  inputs:
    targetType: 'inline'
    script: |
      Write-Host "Files in artifact staging directory:"
      Get-ChildItem -Path "$(Build.ArtifactStagingDirectory)" -Recurse

# Then the pipeline will show exactly what files were actually created.
# ------------------------------------------------------------


# ------------------------------------------------------------
# 10. DEPLOY TO AZURE APP SERVICE
# ------------------------------------------------------------

# This takes the ZIP file created during the Publish step
# and deploys it to your Azure App Service.
#
# azureSubscription:
# The Azure DevOps Service Connection.
#
# WebAppName:
# The name of your Azure App Service.
#
# package:
# The ZIP file that should be deployed.
# ------------------------------------------------------------

- task: PowerShell@2
  displayName: 'Find all generated files'
  inputs:
    targetType: 'inline'
    script: |
      Write-Host "===== ARTIFACT STAGING DIRECTORY ====="
      Get-ChildItem -Path "$(Build.ArtifactStagingDirectory)" -Recurse -Force

      Write-Host "===== SOURCE DIRECTORY ZIP FILES ====="
      Get-ChildItem -Path "$(Build.SourcesDirectory)" -Recurse -Filter *.zip -Force